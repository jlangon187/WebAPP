<div class="max-w-3xl mx-auto px-4 lg:px-8">
    <div class="bg-slate-900/40 border border-primary/10 rounded-3xl p-8 lg:p-12 shadow-2xl backdrop-blur-sm relative overflow-hidden group">
        <!-- Decorational background shape -->
        <div class="absolute -top-24 -right-24 w-64 h-64 bg-primary/10 rounded-full blur-3xl pointer-events-none group-hover:bg-primary/20 transition-all duration-700"></div>
        
        <div class="relative z-10">
            <div class="flex items-center gap-4 mb-8">
                <div class="w-14 h-14 bg-primary/10 rounded-2xl flex items-center justify-center border border-primary/20">
                    <span class="material-symbols-outlined text-3xl text-primary">support_agent</span>
                </div>
                <div>
                    <h1 class="text-3xl font-black italic uppercase tracking-tighter text-white">Centro de Soporte</h1>
                    <p class="text-slate-400 text-sm mt-1 mb-0">Rellena el formulario y abriremos un ticket para ayudarte.</p>
                </div>
            </div>

            <form class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-bold text-slate-300 uppercase tracking-wider mb-2">Usuario en el juego (GPBikes)</label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-500 text-sm">person</span>
                            <input type="text" placeholder="Ej: Rider99" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl py-3 pl-10 pr-4 text-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all shadow-inner">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-300 uppercase tracking-wider mb-2">Correo Electrónico</label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-500 text-sm">mail</span>
                            <input type="email" placeholder="tu@email.com" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl py-3 pl-10 pr-4 text-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all shadow-inner">
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-300 uppercase tracking-wider mb-2">Mensaje / Detalle del Problema</label>
                    <textarea rows="6" placeholder="Describe tu problema con la instalación del mod, tu cuenta, etc..." class="w-full bg-slate-800/50 border border-slate-700 rounded-xl p-4 text-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all shadow-inner resize-none"></textarea>
                </div>

                <div class="pt-4 flex justify-end">
                    <button type="button" class="bg-primary hover:bg-white text-white hover:text-black font-black uppercase tracking-wider px-8 py-3.5 rounded-xl transition-all shadow-[0_0_15px_rgba(0,51,153,0.5)] hover:shadow-[0_0_25px_rgba(255,255,255,0.8)] active:scale-95 flex items-center gap-2">
                        <span class="material-symbols-outlined text-lg">send</span>
                        Enviar Ticket
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

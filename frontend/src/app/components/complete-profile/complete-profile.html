<main class="mx-auto flex w-full max-w-3xl grow flex-col px-6 py-12">
  <div class="rounded-2xl border border-primary/20 bg-slate-900 p-8 shadow-2xl">
    <h1 class="text-3xl font-black text-white">Completa tu perfil de juego</h1>
    <p class="mt-3 text-slate-300">
      Para activar compras y descargas debes indicar tu nombre de usuario y tu GUID de GP Bikes.
    </p>

    <div class="mt-5 rounded-lg border border-amber-400/30 bg-amber-400/10 p-4 text-sm text-amber-200">
      El GUID se usa para vincular y cifrar tus mods comprados.
    </div>

    <div *ngIf="error" class="mt-5 rounded-lg border border-accent-red/20 bg-accent-red/10 p-3 font-bold text-accent-red">
      {{ error }}
    </div>

    <form (ngSubmit)="submit()" class="mt-6 flex flex-col gap-5">
      <div>
        <label class="mb-2 block text-xs font-bold uppercase tracking-widest text-slate-300">Nombre de usuario</label>
        <input
          type="text"
          name="nombre"
          [(ngModel)]="form.nombre"
          required
          class="w-full rounded-lg border border-slate-700 bg-slate-950 px-4 py-3 text-white focus:border-primary focus:ring-2 focus:ring-primary" />
      </div>

      <div>
        <label class="mb-2 block text-xs font-bold uppercase tracking-widest text-slate-300">GUID del juego (8 HEX)</label>
        <input
          type="text"
          name="guid"
          [(ngModel)]="form.guid"
          maxlength="8"
          required
          class="w-full rounded-lg border border-slate-700 bg-slate-950 px-4 py-3 font-mono uppercase tracking-wider text-white focus:border-primary focus:ring-2 focus:ring-primary"
          placeholder="51C617A2" />
      </div>

      <button
        type="submit"
        [disabled]="saving"
        class="rounded-lg bg-primary px-6 py-3 text-base font-black text-white transition-colors hover:bg-primary/90 disabled:cursor-not-allowed disabled:opacity-60">
        {{ saving ? 'Guardando...' : 'Guardar y continuar' }}
      </button>
    </form>
  </div>
</main>

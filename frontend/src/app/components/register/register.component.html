<main class="mx-auto flex w-full max-w-md grow flex-col justify-center px-6 py-12">
    <div class="bg-slate-900 border border-primary/20 rounded-2xl p-8 shadow-2xl">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-black italic uppercase tracking-tighter text-white">
                Únete a <span class="text-primary">GPBIKES-MODS</span>
            </h2>
            <p class="text-sm text-slate-400 mt-2 tracking-wide">Crea una cuenta para comprar y descargar mods</p>
        </div>

        <div *ngIf="error" class="bg-accent-red/10 border border-accent-red/20 text-accent-red p-3 rounded-lg mb-6 text-sm font-bold text-center">
            {{ error }}
        </div>

        <form (ngSubmit)="onSubmit()" #registerForm="ngForm" class="flex flex-col gap-5">
            <div>
                <label class="block text-xs font-bold text-slate-300 uppercase tracking-widest mb-2">Nombre Público</label>
                <input type="text" name="nombre" [(ngModel)]="userData.nombre" required minlength="3"
                       class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-3 text-white focus:ring-2 focus:ring-primary focus:border-primary transition-all placeholder:text-slate-600"
                       placeholder="TuNombre">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-300 uppercase tracking-widest mb-2">Correo Electrónico</label>
                <input type="email" name="email" [(ngModel)]="userData.email" required email
                       class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-3 text-white focus:ring-2 focus:ring-primary focus:border-primary transition-all placeholder:text-slate-600"
                       placeholder="tu@email.com">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-300 uppercase tracking-widest mb-2">GUID</label>
                <input type="text" name="guid" [(ngModel)]="userData.guid" required pattern="^[A-Fa-f0-9]{18}$" minlength="18" maxlength="18"
                       class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-3 text-white focus:ring-2 focus:ring-primary focus:border-primary transition-all placeholder:text-slate-600 uppercase"
                       placeholder="Ej: FF011000010006263C">
                <p class="text-[10px] text-slate-500 mt-1 italic">* 18 caracteres hexadecimales de tu perfil</p>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-300 uppercase tracking-widest mb-2">Contraseña</label>
                <input type="password" name="password" [(ngModel)]="userData.password" required minlength="6"
                       class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-3 text-white focus:ring-2 focus:ring-primary focus:border-primary transition-all placeholder:text-slate-600"
                       placeholder="••••••••">
                <p class="text-[10px] text-slate-500 mt-1 italic">* Mínimo 6 caracteres</p>
            </div>

            <button type="submit" [disabled]="!registerForm.form.valid || loading"
                    class="w-full bg-primary text-white mt-4 py-3.5 rounded-lg font-bold uppercase tracking-wider hover:bg-primary/90 transition-all flex justify-center items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                <span *ngIf="loading" class="material-symbols-outlined animate-spin text-sm">autorenew</span>
                <span *ngIf="!loading" class="material-symbols-outlined text-sm">person_add</span>
                {{ loading ? 'Creando Cuenta...' : 'Crear Cuenta' }}
            </button>
        </form>

        <div class="mt-6">
            <div class="relative">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-slate-700"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="bg-slate-900 px-2 text-slate-500">O regístrate con</span>
                </div>
            </div>

            <div class="mt-6">
                <!-- Discord Auth Button -->
                <a href="/api/auth/discord/login" class="w-full flex justify-center items-center gap-2 py-3.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-[#5865F2] hover:bg-[#4752C4] transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#5865F2] focus:ring-offset-slate-900">
                    <svg class="w-5 h-5 fill-current" viewBox="0 0 127.14 96.36">
                        <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.31,60,73.31,53s5-12.74,11.43-12.74S96.1,46,96,53,91,65.69,84.69,65.69Z"/>
                    </svg>
                    Discord
                </a>
            </div>
        </div>

        <p class="text-center text-sm text-slate-400 mt-8">
            ¿Ya tienes una cuenta? 
            <a routerLink="/login" class="text-primary font-bold hover:underline transition-all">Iniciar Sesión</a>
        </p>
    </div>
</main>

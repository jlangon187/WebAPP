<div class="p-6 lg:p-10 w-full">
  <div class="flex items-center justify-between mb-8 pb-4 border-b border-primary/20">
    <div>
      <h2 class="text-3xl font-black italic uppercase tracking-tighter text-white">Gestor de <span class="text-primary">Tickets</span></h2>
      <p class="text-slate-400 mt-1">Soporte, respuestas y cierre de incidencias</p>
    </div>
    <div class="flex gap-3">
      <button (click)="goBack()" class="px-4 py-2 text-sm font-bold rounded-lg bg-slate-800 hover:bg-slate-700 text-slate-200">Volver</button>
      <button (click)="loadTickets()" class="px-4 py-2 text-sm font-bold rounded-lg bg-primary hover:bg-primary/90 text-white">Actualizar</button>
    </div>
  </div>

  <div *ngIf="loading" class="text-center py-10 text-slate-400">Cargando tickets...</div>
  <div *ngIf="error" class="text-center py-10 text-accent-red font-bold">{{ error }}</div>

  <div *ngIf="!loading && !error" class="space-y-4">
    <div *ngIf="tickets.length === 0" class="text-slate-500 text-sm">No hay tickets registrados.</div>

    <div *ngFor="let ticket of tickets" class="rounded-xl border border-slate-700 bg-slate-900/60 p-4">
      <div class="flex items-center justify-between gap-3 mb-2">
        <p class="text-sm font-bold text-white">Ticket #{{ ticket.id }} - {{ ticket.usuario?.email }}</p>
        <span class="text-[11px] font-bold uppercase px-2.5 py-1 rounded-full"
              [ngClass]="ticket.estado === 'abierto' ? 'bg-amber-500/20 text-amber-300 border border-amber-500/30' : ticket.estado === 'respondido' ? 'bg-blue-500/20 text-blue-300 border border-blue-500/30' : 'bg-slate-700 text-slate-300 border border-slate-600'">
          {{ ticket.estado }}
        </span>
      </div>

      <p class="text-sm text-slate-300 whitespace-pre-wrap mb-3">{{ ticket.mensaje }}</p>
      <p class="text-xs text-slate-500 mb-3">Creado: {{ ticket.creadoEn | date:'short' }}</p>

      <div *ngIf="ticket.estado !== 'cerrado'" class="space-y-3">
        <textarea
          [(ngModel)]="replyDrafts[ticket.id]"
          rows="3"
          class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:ring-2 focus:ring-primary focus:border-primary"
          placeholder="Escribe la respuesta para el usuario..."></textarea>

        <div class="flex gap-2 justify-end">
          <button (click)="closeTicketByAdmin(ticket.id)" class="px-3 py-2 text-xs font-bold rounded-lg bg-slate-700 hover:bg-slate-600 text-white transition-colors">
            Cerrar
          </button>
          <button (click)="replyTicket(ticket.id)" class="px-3 py-2 text-xs font-bold rounded-lg bg-primary hover:bg-primary/90 text-white transition-colors">
            Responder
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

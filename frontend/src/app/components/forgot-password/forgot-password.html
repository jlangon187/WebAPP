<main class="min-h-[calc(100vh-80px)] w-full flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-slate-900 border border-primary/20 rounded-2xl shadow-xl shadow-primary/10 overflow-hidden relative">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary to-accent-red"></div>

        <div class="p-8">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-slate-800 mb-4 border border-primary/30">
                    <span class="material-symbols-outlined text-3xl text-primary">mark_email_read</span>
                </div>
                <h1 class="text-2xl font-black italic uppercase tracking-tighter text-white">Recuperar Contraseña</h1>
                <p class="text-slate-400 text-sm mt-2">
                    Introduce el correo electrónico asociado a tu cuenta y te enviaremos instrucciones para restablecer tu contraseña.
                </p>
            </div>

            <!-- Success Alert -->
            <div *ngIf="successMessage" class="mb-6 p-4 rounded-lg bg-green-900/40 border border-green-500/30 text-green-400 text-sm flex items-start gap-3">
                <span class="material-symbols-outlined text-xl">check_circle</span>
                <p>{{ successMessage }}</p>
            </div>

            <!-- Error Alert -->
            <div *ngIf="errorMessage" class="mb-6 p-4 rounded-lg bg-red-900/40 border border-red-500/30 text-red-400 text-sm flex items-start gap-3 animate-[pulse_0.5s_ease-in-out]">
                <span class="material-symbols-outlined text-xl">error</span>
                <p>{{ errorMessage }}</p>
            </div>

            <form (ngSubmit)="onSubmit()" #forgotForm="ngForm" *ngIf="!successMessage">
                <div class="mb-6">
                    <label for="email" class="block text-sm font-medium text-slate-300 mb-2">Correo Electrónico</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-slate-500 text-lg">mail</span>
                        </div>
                        <input type="email" id="email" name="email" [(ngModel)]="email" required
                            class="block w-full pl-10 pr-3 py-3 border border-slate-700 rounded-lg bg-background-dark text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                            placeholder="tu@email.com">
                    </div>
                </div>

                <div class="space-y-4">
                    <button type="submit" [disabled]="!forgotForm.form.valid || loading"
                        class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-primary hover:bg-blue-700 transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary focus:ring-offset-slate-900 disabled:opacity-50 disabled:cursor-not-allowed uppercase tracking-wider">
                        <span *ngIf="!loading">Enviar Enlace</span>
                        <div *ngIf="loading" class="flex items-center gap-2">
                            <span class="material-symbols-outlined animate-spin" style="animation: spin 1s linear infinite;">progress_activity</span>
                            Enviando...
                        </div>
                    </button>
                    
                    <a routerLink="/login" class="w-full flex w-full justify-center text-sm font-medium text-slate-400 hover:text-white transition-colors">
                        Volver al inicio de sesión
                    </a>
                </div>
            </form>
            
        </div>
    </div>
</main>

<main class="min-h-[calc(100vh-80px)] w-full flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-slate-900 border border-primary/20 rounded-2xl shadow-xl shadow-primary/10 overflow-hidden relative">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary to-accent-red"></div>

        <div class="p-8">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-slate-800 mb-4 border border-primary/30">
                    <span class="material-symbols-outlined text-3xl text-primary">lock_reset</span>
                </div>
                <h1 class="text-2xl font-black italic uppercase tracking-tighter text-white">Nueva Contraseña</h1>
                <p class="text-slate-400 text-sm mt-2">
                    Crea una nueva contraseña segura para tu cuenta.
                </p>
            </div>

            <!-- Success Alert -->
            <div *ngIf="successMessage" class="mb-6 p-4 rounded-lg bg-green-900/40 border border-green-500/30 text-green-400 text-sm flex flex-col gap-2 relative overflow-hidden">
                <div class="flex items-start gap-3">
                    <span class="material-symbols-outlined text-xl">check_circle</span>
                    <p>{{ successMessage }}</p>
                </div>
                <p class="text-xs text-green-500 ml-8 font-bold animate-pulse">Redirigiendo al login...</p>
                <div class="absolute bottom-0 left-0 h-1 bg-green-500 animate-[progress_3s_linear_forwards]"></div>
            </div>

            <!-- Error Alert -->
            <div *ngIf="errorMessage" class="mb-6 p-4 rounded-lg bg-red-900/40 border border-red-500/30 text-red-400 text-sm flex items-start gap-3 animate-[pulse_0.5s_ease-in-out]">
                <span class="material-symbols-outlined text-xl">error</span>
                <p>{{ errorMessage }}</p>
            </div>

            <form (ngSubmit)="onSubmit()" #resetForm="ngForm" *ngIf="!successMessage">
                <div class="space-y-4 mb-6">
                    <div>
                        <label for="newPassword" class="block text-sm font-medium text-slate-300 mb-2">Nueva Contraseña</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <span class="material-symbols-outlined text-slate-500 text-lg">lock</span>
                            </div>
                            <input type="password" id="newPassword" name="newPassword" [(ngModel)]="newPassword" required minlength="6"
                                class="block w-full pl-10 pr-3 py-3 border border-slate-700 rounded-lg bg-background-dark text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                                placeholder="••••••••">
                        </div>
                        <p class="mt-2 text-xs text-slate-400">La contraseña debe tener al menos <span class="text-white font-bold">6 caracteres</span>.</p>
                    </div>

                    <div>
                        <label for="confirmPassword" class="block text-sm font-medium text-slate-300 mb-2">Confirmar Contraseña</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <span class="material-symbols-outlined text-slate-500 text-lg">password</span>
                            </div>
                            <input type="password" id="confirmPassword" name="confirmPassword" [(ngModel)]="confirmPassword" required
                                class="block w-full pl-10 pr-3 py-3 border border-slate-700 rounded-lg bg-background-dark text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                                placeholder="••••••••">
                        </div>
                    </div>
                </div>

                <div class="space-y-4">
                    <button type="submit" [disabled]="!resetForm.form.valid || loading || !token"
                        class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-primary hover:bg-blue-700 transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary focus:ring-offset-slate-900 disabled:opacity-50 disabled:cursor-not-allowed uppercase tracking-wider">
                        <span *ngIf="!loading">Guardar Contraseña</span>
                        <div *ngIf="loading" class="flex items-center gap-2">
                            <span class="material-symbols-outlined animate-spin" style="animation: spin 1s linear infinite;">progress_activity</span>
                            Guardando...
                        </div>
                    </button>
                    
                    <a routerLink="/login" class="w-full flex w-full justify-center text-sm font-medium text-slate-400 hover:text-white transition-colors">
                        Cancelar
                    </a>
                </div>
            </form>
            
        </div>
    </div>
</main>

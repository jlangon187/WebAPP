version: '3.8'

services:

  mariadb:
    image: mariadb:11
    env_file:
      - .env.prod
    environment:
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MARIADB_DATABASE=${MARIADB_DATABASE}
      - MARIADB_USER=${MARIADB_USER}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - gpbikes_shared
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    env_file:
      - .env.prod
    environment:
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
      - DISCORD_REDIRECT_URI=${DISCORD_REDIRECT_URI}
      - FRONTEND_URL=${FRONTEND_URL}
      - JWT_SECRET=${JWT_SECRET}
      - SPRING_MAIL_HOST=${SPRING_MAIL_HOST}
      - SPRING_MAIL_PORT=${SPRING_MAIL_PORT}
      - SPRING_MAIL_USERNAME=${SPRING_MAIL_USERNAME}
      - SPRING_MAIL_PASSWORD=${SPRING_MAIL_PASSWORD}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - PAYPAL_CLIENT_ID=${PAYPAL_CLIENT_ID}
      - PAYPAL_CLIENT_SECRET=${PAYPAL_CLIENT_SECRET}
      - MODS_IMAGES_DIRECTORY=/data/home-images
      - MODS_FILES_DIRECTORY=/data/mods-files
      - MODS_ENCRYPTION_WORKER_API_KEY=${MODS_ENCRYPTION_WORKER_API_KEY}
      - MODS_DOWNLOAD_RETENTION_DAYS=${MODS_DOWNLOAD_RETENTION_DAYS:-15}
      - MODS_DOWNLOAD_PUBLIC_BASE_URL=${MODS_DOWNLOAD_PUBLIC_BASE_URL}
      - MODS_ENCRYPTION_RUNNING_TIMEOUT_MINUTES=${MODS_ENCRYPTION_RUNNING_TIMEOUT_MINUTES:-30}
      - MODS_ENCRYPTION_MAINTENANCE_CRON=${MODS_ENCRYPTION_MAINTENANCE_CRON:-0 */15 * * * *}
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH=true
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE=true
    volumes:
      - ${NAS_HOME_IMAGES_PATH}:/data/home-images
      - ${NAS_MODS_FILES_PATH}:/data/mods-files
    depends_on:
      - mariadb
    networks:
      - gpbikes_shared
    ports:
      - "${BACKEND_HOST_PORT:-8081}:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    env_file:
      - .env.prod
    ports:
      - "${FRONTEND_HOST_PORT:-4200}:80"
    volumes:
      - ${NAS_HOME_IMAGES_PATH}:/usr/share/nginx/html/home:ro
    networks:
      - gpbikes_shared
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mariadb_data:

networks:
  gpbikes_shared:
    external: true
    name: webapp_proyecto_default

version: '3.8'

services:
  db:
    image: mariadb:10.11
    container_name: gpbikes-db
    environment:
      MARIADB_DATABASE: gpbikes_db
      MARIADB_USER: root
      MARIADB_PASSWORD: password
      MARIADB_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: gpbikes-backend
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mariadb://db:3306/gpbikes_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=rootpassword
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      # NOTE: In production, store secrets securely or pass them as ENV vars from Portainer
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
      - DISCORD_REDIRECT_URI=${DISCORD_REDIRECT_URI:-http://localhost/api/auth/discord/callback}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - JWT_SECRET=${JWT_SECRET:-my_super_secure_secret_for_jwt_which_must_be_long_enough_for_hs256_for_gpbikes_mods_2026}
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: gpbikes-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mariadb_data:
